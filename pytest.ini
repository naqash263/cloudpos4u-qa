[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --html=reports/report.html --self-contained-html
markers =
    ai_live: tests that call a live local or remote LLM provider
    ai_api: tests that call real project AI APIs
    smoke: critical smoke tests for quick validation
    regression: full regression test cases
    ui: Selenium UI automation tests
    ai: AI Automation Test
    api: API automation tests
    negative: negative validation test cases
    known_defect: tests linked to known product defects
    performance: performance-related tests
    db: database validation tests
