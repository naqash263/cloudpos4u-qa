openapi: 3.0.3
info:
  title: CloudPOS4U API Contract
  version: 1.0.0
  description: Initial OpenAPI contract for CloudPOS4U QA automation.

servers:
  - url: https://bakebite-pos.cloudpos4u.com/api

paths:
  /user/login:
    post:
      summary: Admin user login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "401":
          description: Invalid credentials

  /dish/all:
    get:
      summary: Get all dishes
      tags:
        - Menu
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: x-branch-id
          required: true
          schema:
            type: string
        - in: header
          name: x-branch-code
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Dishes returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DishListResponse"
        "401":
          description: Unauthorized

  /order/:
    post:
      summary: Create POS order
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: x-branch-id
          required: true
          schema:
            type: string
        - in: header
          name: x-branch-code
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerDetails
                - orderType
                - bills
                - items
                - paymentMethod
                - paymentStatus
              properties:
                customerDetails:
                  type: object
                orderType:
                  type: string
                bills:
                  type: object
                items:
                  type: array
                paymentMethod:
                  type: string
                paymentStatus:
                  type: string
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreatedResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginSuccessResponse:
      type: object
      required:
        - success
        - message
        - accessToken
        - data
      properties:
        success:
          type: boolean
        message:
          type: string
        accessToken:
          type: string
        data:
          type: object
          required:
            - id
            - email
            - role
            - status
            - branchId
          properties:
            id:
              type: string
            email:
              type: string
            role:
              type: string
            status:
              type: string
            branchId:
              type: string

    DishListResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - price
              - isAvailable
              - branchId
            properties:
              id:
                type: string
              name:
                type: string
              price:
                type: number
              isAvailable:
                type: boolean
              branchId:
                type: string

    OrderCreatedResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          required:
            - id
            - orderNumber
            - orderType
            - paymentMethod
            - paymentStatus
            - branchId
            - items
          properties:
            id:
              type: string
            orderNumber:
              type: string
            orderType:
              type: string
            paymentMethod:
              type: string
            paymentStatus:
              type: string
            branchId:
              type: string
            items:
              type: array